services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kakeibase
      POSTGRES_USER: kakeibase
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kakeibase"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
